<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYA Cáceres - Reporte Solidario</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            max-width: 1000px; 
            margin: auto; 
            background-color: #f0f2f5; 
            color: #333;
        }
        h2 { color: #e60000; text-align: center; }
        .subtitulo { text-align: center; margin-bottom: 30px; color: #666; }
        #formulario-dya {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        select, textarea, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { 
            background-color: #e60000; 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            font-size: 1.1em; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #c40000; }
        .btn-gps { background-color: #28a745; margin-top: 10px; padding: 10px; font-size: 0.9em; }
        .aviso-legal { font-size: 0.75em; color: #888; margin-top: 20px; line-height: 1.4; text-align: center; }

        @media (min-width: 768px) {
            .contenedor-flexible { display: flex; gap: 30px; }
            .columna-izq, .columna-der { flex: 1; }
        }
        #map { height: 350px; border-radius: 10px; border: 2px solid #eee; z-index: 1; }
    </style>
</head>
<body>

    <h2>Aviso de Persona sin Hogar</h2>
    <p class="subtitulo">Proyecto Vedruna en colaboración con DYA Cáceres</p>

    <form id="formulario-dya">
        <div class="contenedor-flexible">
            <div class="columna-izq">
                <div class="campo">
                    <label for="necesidad">¿Qué necesita principalmente?</label>
                    <select id="necesidad" name="necesidad">
                        <option value="comida">Alimentos/Bebida</option>
                        <option value="abrigo">Ropa o mantas</option>
                        <option value="sanitario">Atención sanitaria</option>
                        <option value="albergue">Traslado a albergue</option>
                        <option value="otro">Otros (especificar abajo)</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="urgencia">Nivel de urgencia:</label>
                    <select id="urgencia" name="urgencia">
                        <option value="baja">Baja (Solo información)</option>
                        <option value="media">Media (Necesita atención hoy)</option>
                        <option value="alta">Alta (Situación crítica / Frío extremo)</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="num_personas">Número de Personas:</label>
                    <input type="number" id="num_personas" name="num_personas" min="1" value="1">
                </div>

                <div class="campo">
                    <label for="menores">¿Hay presencia de menores?</label>
                    <select id="menores" name="menores">
                        <option value="no">No se ven menores</option>
                        <option value="si">Sí, hay menores presentes</option>
                        <option value="duda">No estoy seguro/a</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="horario">¿Cuándo suele estar en este punto?</label>
                    <select id="horario" name="horario">
                        <option value="ahora">Lo estoy viendo ahora mismo</option>
                        <option value="mañana">Suele estar por las mañanas</option>
                        <option value="tarde">Suele estar por las tardes</option>
                        <option value="noche">Suele estar por las noches</option>
                    </select>
                </div>
            </div>

            <div class="columna-der">
                <div class="campo">
                    <label>Ubicación (Pulsa el mapa o usa el GPS):</label>
                    <div id="map"></div>
                    <button type="button" class="btn-gps" onclick="usarGPS()">Usar mi ubicación GPS actual</button>
                    <input type="hidden" id="latitud" name="latitud">
                    <input type="hidden" id="longitud" name="longitud">
                    <input type="hidden" id="ip_remota" name="ip_remota" value="Detectando...">
                </div>

                <div class="campo">
                    <label for="descripcion">Descripción física / Situación:</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Ej: Hombre, unos 50 años, chaqueta azul..."></textarea>
                </div>
            </div>
        </div>

        <p class="aviso-legal">
            <b>Aviso de seguridad:</b> Para evitar reportes falsos, se registrará la dirección IP del dispositivo. El uso indebido será notificado a las autoridades.
        </p>

        <button type="submit" id="btn-enviar">Enviar reporte a DYA</button>
    </form>

    <script>
        // --- CAPTURA DE IP ---
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('ip_remota').value = data.ip;
                console.log("IP Lista: " + data.ip);
            })
            .catch(() => { document.getElementById('ip_remota').value = "IP no disponible"; });

        // --- CONFIGURACIÓN MAPA ---
        var map = L.map('map').setView([39.476, -6.372], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        var marker = L.marker([39.476, -6.372], {draggable: true}).addTo(map);

        function actualizarCoordenadas(lat, lng) {
            document.getElementById('latitud').value = parseFloat(lat).toFixed(6);
            document.getElementById('longitud').value = parseFloat(lng).toFixed(6);
        }

        actualizarCoordenadas(39.476, -6.372);

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            actualizarCoordenadas(e.latlng.lat, e.latlng.lng);
        });

        function usarGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    var lat = p.coords.latitude;
                    var lng = p.coords.longitude;
                    marker.setLatLng([lat, lng]);
                    map.setView([lat, lng], 17);
                    actualizarCoordenadas(lat, lng);
                }, function() { alert("GPS no disponible"); });
            }
        }

        // --- ENVÍO ---
        // URL Corregida (comilla cerrada)
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw8UMur6_6JcgYSQMtBndIjRYAFDVjbk2F7uO74pTKM2R6BdmTXR4-_BEb6ORuDb0t0/exec';
        const form = document.getElementById('formulario-dya');
        const btnEnviar = document.getElementById('btn-enviar');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btnEnviar.disabled = true;
            btnEnviar.innerText = "Enviando...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors'})
                .then(() => {
                    alert("¡Reporte enviado! IP registrada.");
                    btnEnviar.disabled = false;
                    btnEnviar.innerText = "Enviar reporte a DYA";
                    form.reset();
                    marker.setLatLng([39.476, -6.372]);
                    actualizarCoordenadas(39.476, -6.372);
                })
                .catch(error => {
                    alert("Error en el envío.");
                    btnEnviar.disabled = false;
                });
        });
    </script>
</body>
</html>
