<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYA Cáceres - Reporte Solidario</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Fondo general y centrado */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            max-width: 1000px; /* Más ancho para el PC */
            margin: auto; 
            background-color: #f0f2f5; /* Gris suave */
            color: #333;
        }

        h2 { color: #e60000; text-align: center; }
        .subtitulo { text-align: center; margin-bottom: 30px; color: #666; }

        /* Tarjeta blanca del formulario */
        #formulario-dya {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        }

        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        select, textarea, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        button { 
            background-color: #e60000; 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            font-size: 1.1em; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #c40000; }

        /* Layout de dos columnas para PC */
        @media (min-width: 768px) {
            .contenedor-flexible {
                display: flex;
                gap: 30px;
            }
            .columna-izq, .columna-der { flex: 1; }
        }

        #map { 
            height: 400px; 
            border-radius: 10px; 
            border: 2px solid #eee;
            z-index: 1; /* Para evitar problemas con otros elementos */
        }
    </style>
</head>
<body>

    <h2>Aviso de Persona sin Hogar</h2>
    <p class="subtitulo">Proyecto Vedruna en colaboración con DYA Cáceres</p>

    <form id="formulario-dya">
        <div class="contenedor-flexible">
            
            <div class="columna-izq">
                <div class="campo">
                    <label for="necesidad">¿Qué necesita principalmente?</label>
                    <select id="necesidad" name="necesidad">
                        <option value="comida">Alimentos/Bebida</option>
                        <option value="abrigo">Ropa o mantas</option>
                        <option value="sanitario">Atención sanitaria</option>
                        <option value="albergue">Traslado a albergue</option>
                        <option value="otro">Otros (especificar abajo)</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="urgencia">Nivel de urgencia:</label>
                    <select id="urgencia" name="urgencia">
                        <option value="baja">Baja (Solo información)</option>
                        <option value="media">Media (Necesita atención hoy)</option>
                        <option value="alta">Alta (Situación crítica / Frío extremo)</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="num_personas">Número de Personas:</label>
                    <input type="number" id="num_personas" name="num_personas" min="1" value="1">
                </div>

                <div class="campo">
                    <label for="menores">¿Hay presencia de menores?</label>
                    <select id="menores" name="menores">
                        <option value="no">No se ven menores</option>
                        <option value="si">Sí, hay menores presentes</option>
                        <option value="duda">No estoy seguro/a</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="horario">¿Cuándo suele estar en este punto?</label>
                    <select id="horario" name="horario">
                        <option value="ahora">Lo estoy viendo ahora mismo</option>
                        <option value="mañana">Suele estar por las mañanas</option>
                        <option value="tarde">Suele estar por las tardes</option>
                        <option value="noche">Suele estar por las noches</option>
                    </select>
                </div>
            </div>

            <div class="columna-der">
                <div class="campo">
                    <label>Localización (Pulsa en el mapa):</label>
                    <div id="map"></div>
                    <input type="hidden" id="latitud" name="latitud">
                    <input type="hidden" id="longitud" name="longitud">
                </div>

                <div class="campo">
                    <label for="descripcion">Descripción física / Situación:</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Ej: Hombre, unos 50 años, chaqueta azul..."></textarea>
                </div>
            </div>

        </div>

        <button type="submit" id="btn-enviar">Enviar reporte a DYA</button>
    </form>

    <script>
        // Configuración del Mapa
        var map = L.map('map').setView([39.476, -6.372], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var marker = L.marker([39.476, -6.372], {draggable: true}).addTo(map);

        function actualizarCoordenadas(lat, lng) {
            document.getElementById('latitud').value = lat.toFixed(6);
            document.getElementById('longitud').value = lng.toFixed(6);
        }

        actualizarCoordenadas(39.476, -6.372);

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            actualizarCoordenadas(e.latlng.lat, e.latlng.lng);
        });
		
		// --- BLOQUE NUEVO: Envío a Google Sheets ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxD_QDVERNcyN4n8GdHS9v123jAciy-m8_csw8BK9zStOikWHX-QKjXA5EbdaVa6oRD/exec'; // <--- PEGA AQUÍ TU URL DE PASO 2
    const form = document.getElementById('formulario-dya');
    const btnEnviar = document.getElementById('btn-enviar');

    form.addEventListener('submit', e => {
        e.preventDefault(); // Evita que la página se recargue
        btnEnviar.disabled = true;
        btnEnviar.innerText = "Enviando reporte...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("¡Reporte enviado con éxito! Los datos ya están en la hoja de cálculo.");
                btnEnviar.disabled = false;
                btnEnviar.innerText = "Enviar reporte a DYA";
                form.reset(); // Limpia el formulario
                // Devolvemos el marcador al centro de Cáceres
                marker.setLatLng([39.476, -6.372]);
                actualizarCoordenadas(39.476, -6.372);
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Error al enviar. Revisa la URL o tu conexión.");
                btnEnviar.disabled = false;
                btnEnviar.innerText = "Enviar reporte a DYA";
            });
    });
    </script>
</body>
</html>
